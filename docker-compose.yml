# Local infra for Dish Passport: Postgres+pgvector and Redis (Celery broker/backend).
#   docker compose up -d
#   for m in 001_init 002_flavor_svd 003_cf 004_taste_profiles; do \
#     psql "$DP_DATABASE_URL" -f backend/migrations/$m.sql; done
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dishport-db
    environment:
      POSTGRES_USER: dishport
      POSTGRES_PASSWORD: dishport
      POSTGRES_DB: dishport
    ports:
      - "${DP_DB_PORT:-5432}:5432"   # override DP_DB_PORT if 5432 is taken locally
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dishport -d dishport"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: dishport-redis
    ports:
      - "${DP_REDIS_PORT:-6379}:6379"   # override DP_REDIS_PORT if 6379 is taken locally
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  # Azure Blob Storage emulator (local stand-in for a real storage account). The container's
  # default credentials are Azurite's well-known dev account. Create the container with
  # scripts/smoke_storage.py (idempotent).
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: dishport-azurite
    command: azurite-blob --blobHost 0.0.0.0 --blobPort 10000 --location /data --skipApiVersionCheck
    environment:
      # Custom dev account so the key is a known-valid base64 (matches the backend config).
      AZURITE_ACCOUNTS: "devstoreaccount1:AAECAwQFBgcICQoLDA0ODxAREhMUFRYXGBkaGxwdHh8gISIjJCUmJygpKissLS4v"
    ports:
      - "${DP_AZURITE_PORT:-10000}:10000"
    volumes:
      - ./azuritedata:/data
