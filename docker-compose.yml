# Local infra for Dish Passport: Postgres+pgvector and Redis (Celery broker/backend).
#   docker compose up -d
#   for m in 001_init 002_flavor_svd 003_cf 004_taste_profiles; do \
#     psql "$DP_DATABASE_URL" -f backend/migrations/$m.sql; done
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dishport-db
    environment:
      POSTGRES_USER: dishport
      POSTGRES_PASSWORD: dishport
      POSTGRES_DB: dishport
    ports:
      - "${DP_DB_PORT:-5432}:5432"   # override DP_DB_PORT if 5432 is taken locally
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dishport -d dishport"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: dishport-redis
    ports:
      - "${DP_REDIS_PORT:-6379}:6379"   # override DP_REDIS_PORT if 6379 is taken locally
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  # S3-compatible object storage for dish photos (local stand-in for AWS S3).
  # Console at http://localhost:9001 (minioadmin / minioadmin). Create the bucket with
  # scripts/smoke_storage.py (idempotent) or the MinIO console.
  minio:
    image: minio/minio:latest
    container_name: dishport-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${DP_MINIO_PORT:-9000}:9000"
      - "${DP_MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - ./miniodata:/data
