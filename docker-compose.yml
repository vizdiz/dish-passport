# Local Postgres + pgvector for Dish Passport.
#   docker compose up -d
#   psql "$DP_DATABASE_URL" -f backend/migrations/001_init.sql
# (Redis/Celery arrive with the batch services — not part of Service 1.)
services:
  db:
    image: pgvector/pgvector:pg16
    container_name: dishport-db
    environment:
      POSTGRES_USER: dishport
      POSTGRES_PASSWORD: dishport
      POSTGRES_DB: dishport
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dishport -d dishport"]
      interval: 3s
      timeout: 3s
      retries: 20
